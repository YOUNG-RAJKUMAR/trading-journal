<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOURNAL // Pro Audit Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #000000; --surface: #0a0a0a; --border: #222222;
            --primary: #ffffff; --negative: #ff4444; --positive: #44ff88; 
            --text: #cccccc; --text-light: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        /* DASHBOARD UI */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; width: 350px; text-align: center; }
        .login-input { width: 100%; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; box-sizing: border-box;}
        .app-container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; display: none; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .btn-action { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .tab-nav { display: flex; gap: 20px; margin-bottom: 30px; }
        .tab-btn { background: transparent; border: none; color: var(--text); cursor: pointer; opacity: 0.5; text-transform: uppercase; font-size: 0.8rem; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        input, select, textarea { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; font-size: 0.8rem; }
        .save-btn { background: #fff; color: #000; font-weight: 700; border: none; padding: 15px; cursor: pointer; grid-column: span 2; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.65rem; color: #666; padding: 15px; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        /* CALENDAR DASHBOARD */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day { background: #111; aspect-ratio: 1; padding: 5px; font-size: 0.7rem; border: 1px solid #222; }
        .cal-profit { background: rgba(68, 255, 136, 0.1); border-color: var(--positive); }
        .cal-loss { background: rgba(255, 68, 68, 0.1); border-color: var(--negative); }

        /* --- PDF REPORT TEMPLATE (WHITE BACKGROUND) --- */
        #pdf-report { 
            position: absolute; left: -9999px; width: 800px; 
            background: #fff; color: #000; padding: 40px; font-size: 12px;
        }
        .pdf-section { page-break-after: always; margin-bottom: 40px; }
        .pdf-h1 { font-size: 24px; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; letter-spacing: 2px; }
        .pdf-stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .pdf-box { border: 1px solid #ddd; padding: 15px; text-align: center; background: #f9f9f9; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .pdf-table th { background: #f0f0f0; border: 1px solid #ddd; padding: 8px; font-size: 10px; }
        .pdf-table td { border: 1px solid #ddd; padding: 8px; font-size: 10px; text-align: left; }
        .pdf-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid #eee; }
        .pdf-cal-cell { height: 60px; border: 1px solid #eee; padding: 5px; font-size: 9px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>TERMINAL</h2>
        <input type="text" id="user-input" class="login-input" placeholder="USER">
        <input type="password" id="pass-input" class="login-input" placeholder="PASS">
        <button id="loginBtn" class="save-btn" style="width:100%;">ACCESS</button>
    </div>
</div>

<div class="app-container" id="main-content">
    <header class="header-top">
        <h1 style="font-weight:300;">JOURNAL // <span id="display-user"></span></h1>
        <div>
            <button class="btn-action" style="background:#fff; color:#000; font-weight:bold;" onclick="ui.exportPDF()">Export Complete Audit</button>
            <button class="btn-action" onclick="location.reload()">Logout</button>
        </div>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="ui.switchTab('journal', this)">Journal</button>
        <button class="tab-btn" onclick="ui.switchTab('analytics', this)">Analytics</button>
        <button class="tab-btn" onclick="ui.switchTab('calendar', this)">Calendar</button>
    </nav>

    <div id="tab-journal" class="tab-content active">
        <div class="card"><div class="form-grid">
            <input type="date" id="t-date">
            <input type="text" id="t-symbol" placeholder="Symbol">
            <input type="number" id="t-lots" placeholder="Lots">
            <select id="t-side"><option value="BUY">BUY</option><option value="SELL">SELL</option></select>
            <input type="number" id="t-entry" placeholder="Entry">
            <input type="number" id="t-exit" placeholder="Exit">
            <select id="t-asset"><option value="100000">Forex</option><option value="1000">Gold</option><option value="10">Indices</option></select>
            <textarea id="t-notes" placeholder="Notes"></textarea>
            <button onclick="ui.handleNewTrade()" class="save-btn" id="saveBtn">Log Trade</button>
        </div></div>
        <table style="background:var(--surface)">
            <thead><tr><th>Date</th><th>Symbol</th><th>Side</th><th>P/L ($)</th></tr></thead>
            <tbody id="tradeBody"></tbody>
        </table>
    </div>

    <div id="tab-analytics" class="tab-content">
        <div class="card"><canvas id="equityChart" height="100"></canvas></div>
    </div>

    <div id="tab-calendar" class="tab-content">
        <div class="cal-grid" id="dashboardCal"></div>
    </div>
</div>

<div id="pdf-report">
    <div class="pdf-section">
        <h1 class="pdf-h1">EXECUTIVE SUMMARY</h1>
        <p>Report for: <b id="pdf-user"></b> | Generated: <span id="pdf-date"></span></p>
        <div class="pdf-stat-row">
            <div class="pdf-box"><span>Net Profit</span><div id="pdf-pnl" style="font-weight:bold; font-size:16px;"></div></div>
            <div class="pdf-box"><span>Win Rate</span><div id="pdf-wr" style="font-weight:bold; font-size:16px;"></div></div>
            <div class="pdf-box"><span>Profit Factor</span><div id="pdf-pf" style="font-weight:bold; font-size:16px;"></div></div>
            <div class="pdf-box"><span>Total Trades</span><div id="pdf-total" style="font-weight:bold; font-size:16px;"></div></div>
        </div>
        <h3 style="border-bottom: 1px solid #eee;">Equity Growth Curve</h3>
        <div id="pdf-chart-slot" style="margin-top:20px;"></div>
    </div>

    <div class="pdf-section">
        <h1 class="pdf-h1">PERFORMANCE CALENDAR</h1>
        <div class="pdf-cal-grid" id="pdf-cal-slot"></div>
    </div>

    <div class="pdf-section">
        <h1 class="pdf-h1">EXECUTION LOG</h1>
        <table class="pdf-table">
            <thead><tr><th>Date</th><th>Symbol</th><th>Side</th><th>Lots</th><th>Profit ($)</th><th>Notes</th></tr></thead>
            <tbody id="pdf-table-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxnZaZYUFSmN8TY-_JXsTOq5hqf3rMkaI",
        authDomain: "rk-journaling-trades.firebaseapp.com",
        projectId: "rk-journaling-trades",
        storageBucket: "rk-journaling-trades.firebasestorage.app",
        messagingSenderId: "769348692241",
        appId: "1:769348692241:web:804455307a5fedd82f84b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tradesCol = collection(db, "trades");

    let currentUser = null;
    let cachedTrades = [];

    document.getElementById('loginBtn').onclick = async () => {
        const u = document.getElementById('user-input').value.trim().toUpperCase();
        const p = document.getElementById('pass-input').value;
        const snap = await getDoc(doc(db, "users", u));
        if (snap.exists() && snap.data().password === p) {
            currentUser = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('display-user').innerText = u;
            ui.init();
        } else { alert("Error"); }
    };

    window.ui = {
        charts: {},
        init() { document.getElementById('t-date').valueAsDate = new Date(); this.renderAll(); },
        switchTab(id, btn) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active'); btn.classList.add('active');
        },
        async handleNewTrade() {
            const trade = {
                user_id: currentUser,
                symbol: document.getElementById('t-symbol').value.toUpperCase(),
                lots: parseFloat(document.getElementById('t-lots').value),
                side: document.getElementById('t-side').value,
                profit: (parseFloat(document.getElementById('t-exit').value) - parseFloat(document.getElementById('t-entry').value)) * parseFloat(document.getElementById('t-lots').value) * parseFloat(document.getElementById('t-asset').value) * (document.getElementById('t-side').value === 'BUY' ? 1 : -1),
                date: document.getElementById('t-date').value,
                notes: document.getElementById('t-notes').value
            };
            await addDoc(tradesCol, trade); this.renderAll();
        },
        async renderAll() {
            const q = query(tradesCol, where("user_id", "==", currentUser), orderBy("date", "desc"));
            const snap = await getDocs(q);
            cachedTrades = snap.docs.map(d => d.data());
            
            const body = document.getElementById('tradeBody'); body.innerHTML = '';
            let cumulative = [0], totalP = 0, wins = 0;

            [...cachedTrades].reverse().forEach(t => {
                totalP += t.profit; if(t.profit > 0) wins++;
                cumulative.push(totalP);
                body.insertAdjacentHTML('afterbegin', `<tr><td>${t.date}</td><td>${t.symbol}</td><td>${t.side}</td><td>$${t.profit.toFixed(2)}</td></tr>`);
            });

            this.updateChart(cumulative);
            this.renderCalendar();
        },
        updateChart(data) {
            const ctx = document.getElementById('equityChart');
            if(this.charts.equity) this.charts.equity.destroy();
            this.charts.equity = new Chart(ctx, { type: 'line', data: { labels: data.map((_,i)=>i), datasets: [{ data, borderColor: '#fff', pointRadius: 0 }] } });
        },
        renderCalendar() {
            const grid = document.getElementById('dashboardCal'); grid.innerHTML = '';
            for(let i=1; i<=31; i++) {
                const dStr = `2025-03-${String(i).padStart(2,'0')}`; // Static month for demo
                const profit = cachedTrades.filter(t=>t.date===dStr).reduce((s,t)=>s+t.profit,0);
                grid.innerHTML += `<div class="cal-day ${profit>0?'cal-profit':(profit<0?'cal-loss':'')}">${i}</div>`;
            }
        },

        async exportPDF() {
            const report = document.getElementById('pdf-report');
            document.getElementById('pdf-user').innerText = currentUser;
            document.getElementById('pdf-date').innerText = new Date().toLocaleDateString();
            
            // 1. STATS
            const totalP = cachedTrades.reduce((s,t)=>s+t.profit,0);
            const wins = cachedTrades.filter(t=>t.profit > 0).length;
            document.getElementById('pdf-pnl').innerText = `$${totalP.toFixed(2)}`;
            document.getElementById('pdf-wr').innerText = Math.round((wins/cachedTrades.length)*100) + '%';
            document.getElementById('pdf-total').innerText = cachedTrades.length;

            // 2. CHART (Re-render as black on white)
            const canvas = document.createElement('canvas'); canvas.width = 800; canvas.height = 300;
            new Chart(canvas, { 
                type: 'line', 
                data: { labels: cachedTrades.map((_,i)=>i), datasets: [{ data: this.charts.equity.data.datasets[0].data, borderColor: '#000', pointRadius: 0 }] },
                options: { devicePixelRatio: 2 }
            });
            await new Promise(r => setTimeout(r, 300));
            document.getElementById('pdf-chart-slot').innerHTML = `<img src="${canvas.toDataURL()}" style="width:100%">`;

            // 3. CALENDAR
            const calSlot = document.getElementById('pdf-cal-slot'); calSlot.innerHTML = '';
            for(let i=1; i<=31; i++) {
                const dayP = cachedTrades.filter(t=>t.date.endsWith(String(i).padStart(2,'0'))).reduce((s,t)=>s+t.profit,0);
                calSlot.innerHTML += `<div class="pdf-cal-cell" style="background:${dayP>0?'#eaffea':(dayP<0?'#ffeaea':'#fff')}"><b>${i}</b><br>$${dayP.toFixed(0)}</div>`;
            }

            // 4. LOG
            const tBody = document.getElementById('pdf-table-body'); tBody.innerHTML = '';
            cachedTrades.forEach(t => {
                tBody.innerHTML += `<tr><td>${t.date}</td><td>${t.symbol}</td><td>${t.side}</td><td>${t.lots}</td><td>$${t.profit.toFixed(2)}</td><td>${t.notes}</td></tr>`;
            });

            // GENERATE
            report.style.position = 'static'; report.style.left = '0';
            await html2pdf().set({ margin: 10, filename: 'Audit_Report.pdf', html2canvas: { scale: 2 }, jsPDF: { format: 'a4' } }).from(report).save();
            report.style.position = 'absolute'; report.style.left = '-9999px';
        }
    };
</script>
</body>
</html>
