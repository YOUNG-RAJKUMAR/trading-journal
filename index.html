<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOURNAL// Pro Multi-User</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #000000; --surface: #0a0a0a; --border: #222222;
            --primary: #ffffff; --negative: #ff4444; --positive: #44ff88; 
            --text: #cccccc; --text-light: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; width: 100%; max-width: 350px; text-align: center; }
        .login-input { width: 100%; margin-bottom: 15px; box-sizing: border-box; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; }

        .app-container { max-width: 1450px; margin: 0 auto; padding: 40px 20px; display: none; background: var(--bg); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header-title { font-weight: 300; font-size: 1.5rem; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; }
        .btn-action { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }

        .tab-nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: transparent; border: none; color: var(--text); padding: 10px 0; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--primary); color: var(--text-light); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; } /* REMOVED ANIMATION HERE TO FIX PDF BLUR */

        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        input, select, textarea, button { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; font-size: 0.8rem; }
        .save-btn { background: #fff; color: #000; font-weight: 600; cursor: pointer; border: none; padding: 15px; }

        .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { color: #666; font-size: 0.65rem; text-transform: uppercase; padding: 15px; text-align: left; border-bottom: 1px solid var(--border); background: #050505; }
        td { padding: 15px; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .cal-day { background: var(--surface); min-height: 80px; padding: 10px; }
        .cal-day.profit { border-top: 2px solid var(--positive); }
        .cal-day.loss { border-top: 2px solid var(--negative); }

        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 20px; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .stat-val { display: block; font-size: 1.4rem; color: #fff; margin-top: 5px; }

        /* PDF FIXES */
        #pdf-summary { display: none; background: #000; color: #fff; text-align: center; padding: 100px 20px; }
        
        @media print {
            .no-pdf { display: none !important; }
            .tab-content { display: block !important; page-break-after: always !important; opacity: 1 !important; visibility: visible !important; }
            body, .app-container { background: #000 !important; }
        }

        .exporting-pdf .tab-content { display: block !important; opacity: 1 !important; page-break-after: always !important; }
        .exporting-pdf .no-pdf { display: none !important; }
        .exporting-pdf #pdf-summary { display: block !important; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="font-weight:300; letter-spacing:3px;">IDENTITY CHECK</h2>
        <input type="text" id="user-input" class="login-input" placeholder="USERNAME">
        <input type="password" id="pass-input" class="login-input" placeholder="PASSWORD">
        <button id="loginBtn" class="save-btn" style="width:100%;">ACCESS JOURNAL</button>
        <p id="login-err" style="color:var(--negative); font-size:0.7rem; margin-top:15px; display:none;">Invalid Credentials</p>
    </div>
</div>

<div class="app-container" id="main-content">
    <div id="pdf-summary">
        <h1 style="font-size: 3rem; letter-spacing: 10px; font-weight: 300;">TRADING REPORT</h1>
        <p style="letter-spacing: 5px; color: #888;">USER: <span id="pdf-user"></span></p>
        <div style="margin-top: 50px; border-top: 1px solid #222; padding-top: 20px;">
            <p id="pdf-timestamp" style="font-size: 0.8rem; color: #444;"></p>
        </div>
    </div>

    <header class="header-top no-pdf">
        <h1 class="header-title">JOURNAL // <span id="display-user"></span></h1>
        <div style="display:flex; gap:10px">
            <button class="btn-action" onclick="ui.undoLast()">Undo</button>
            <button class="btn-action" style="background:#fff; color:#000" id="pdf-btn" onclick="ui.exportPDF()">Export PDF</button>
            <button class="btn-action" onclick="location.reload()">Logout</button>
        </div>
    </header>

    <nav class="tab-nav no-pdf">
        <button class="tab-btn active" id="btn-journal" onclick="ui.switchTab('journal')">Journal</button>
        <button class="tab-btn" id="btn-calendar" onclick="ui.switchTab('calendar')">Calendar</button>
        <button class="tab-btn" id="btn-analytics" onclick="ui.switchTab('analytics')">Analytics</button>
    </nav>

    <div id="tab-journal" class="tab-content active">
        <div class="card no-pdf">
            <div class="form-grid">
                <input type="date" id="t-date"><input type="time" id="t-start"><input type="time" id="t-end">
                <input type="text" id="t-symbol" placeholder="Symbol">
                <select id="t-side"><option value="BUY">Long</option><option value="SELL">Short</option></select>
                <input type="number" id="t-entry" placeholder="Entry">
                <input type="number" id="t-exit" placeholder="Exit">
                <input type="number" id="t-lots" placeholder="Lots">
                <select id="t-asset"><option value="100000">Forex</option><option value="1000">Gold</option></select>
                <button onclick="ui.handleNewTrade()" class="save-btn" id="saveBtn" style="grid-column: span 2;">Log Trade</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Date</th><th>Symbol</th><th>Side</th><th>P/L ($)</th><th>Notes</th></tr></thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-calendar" class="tab-content">
        <div class="calendar-layout">
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <div id="tab-analytics" class="tab-content">
        <div class="analytics-grid" id="stat-boxes">
            <div class="stat-card"><span class="stat-label">Win Rate</span><span id="s-wr" class="stat-val">0%</span></div>
            <div class="stat-card"><span class="stat-label">Total P/L</span><span id="s-tpnl" class="stat-val">$0</span></div>
        </div>
        <div class="card">
            <canvas id="equityChart" style="max-height: 300px;"></canvas>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxnZaZYUFSmN8TY-_JXsTOq5hqf3rMkaI",
        authDomain: "rk-journaling-trades.firebaseapp.com",
        projectId: "rk-journaling-trades",
        storageBucket: "rk-journaling-trades.firebasestorage.app",
        messagingSenderId: "769348692241",
        appId: "1:769348692241:web:804455307a5fedd82f84b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tradesCol = collection(db, "trades");

    let currentUser = null;
    let cachedTrades = [];

    document.getElementById('loginBtn').onclick = async () => {
        const u = document.getElementById('user-input').value.trim().toUpperCase();
        const p = document.getElementById('pass-input').value;
        const userRef = doc(db, "users", u);
        const snap = await getDoc(userRef);
        if (snap.exists() && snap.data().password === p) {
            currentUser = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('display-user').innerText = u;
            ui.init();
        } else { alert("Invalid login"); }
    };

    window.ui = {
        chart: null,
        init() { this.renderAll(); },
        switchTab(id) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`btn-${id}`).classList.add('active');
        },
        async handleNewTrade() {
            const entry = parseFloat(document.getElementById('t-entry').value);
            const exit = parseFloat(document.getElementById('t-exit').value);
            const side = document.getElementById('t-side').value;
            const lots = parseFloat(document.getElementById('t-lots').value);
            const mult = parseFloat(document.getElementById('t-asset').value);
            const pnl = (exit - entry) * lots * mult * (side === 'BUY' ? 1 : -1);

            await addDoc(tradesCol, {
                user_id: currentUser, date: document.getElementById('t-date').value,
                symbol: document.getElementById('t-symbol').value, side, profit: pnl, timestamp: Date.now()
            });
            this.renderAll();
        },
        async renderAll() {
            const q = query(tradesCol, where("user_id", "==", currentUser), orderBy("date", "desc"));
            const snap = await getDocs(q);
            const trades = snap.docs.map(d => d.data());
            cachedTrades = trades;

            const body = document.getElementById('tradeBody'); body.innerHTML = '';
            let total = 0, wins = 0, curve = [0];
            
            [...trades].reverse().forEach(t => {
                total += t.profit;
                if(t.profit > 0) wins++;
                curve.push(total);
                body.insertAdjacentHTML('afterbegin', `<tr><td>${t.date}</td><td>${t.symbol}</td><td>${t.side}</td><td style="color:${t.profit>=0?'#44ff88':'#ff4444'}">$${t.profit.toFixed(2)}</td><td>--</td></tr>`);
            });

            document.getElementById('s-wr').innerText = trades.length ? Math.round((wins/trades.length)*100)+'%' : '0%';
            document.getElementById('s-tpnl').innerText = '$' + total.toFixed(0);
            this.updateChart(curve);
            this.renderCalendar();
        },
        renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            for(let i=1; i<=31; i++) {
                grid.innerHTML += `<div class="cal-day"><b>${i}</b></div>`;
            }
        },
        updateChart(data) {
            const ctx = document.getElementById('equityChart').getContext('2d');
            if(this.chart) this.chart.destroy();
            this.chart = new Chart(ctx, {
                type: 'line', 
                data: { labels: data.map((_,i)=>i), datasets: [{ data, borderColor: '#fff', tension: 0.1 }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false } } }
            });
        },
        exportPDF() {
            const element = document.getElementById('main-content');
            const btn = document.getElementById('pdf-btn');
            
            btn.innerText = "GENERATING...";
            document.getElementById('pdf-user').innerText = currentUser;
            document.getElementById('pdf-timestamp').innerText = new Date().toLocaleString();

            // 1. Force Export Mode (Shows all tabs, removes animations)
            element.classList.add('exporting-pdf');
            
            const opt = {
                margin: 0,
                filename: `REPORT_${currentUser}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#000000',
                    delay: 1000 // Give charts time to settle
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };

            // 2. Run Export
            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.remove('exporting-pdf');
                btn.innerText = "Export PDF";
            }).catch(err => {
                console.error(err);
                element.classList.remove('exporting-pdf');
                btn.innerText = "Export PDF";
            });
        }
    };
</script>
</body>
</html>
