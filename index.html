<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOURNAL // Ultimate Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #000000; --surface: #0a0a0a; --border: #222222;
            --primary: #ffffff; --negative: #ff4444; --positive: #44ff88; 
            --text: #cccccc; --text-light: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
        
        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; width: 100%; max-width: 350px; text-align: center; }
        .login-input { width: 100%; margin-bottom: 15px; box-sizing: border-box; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: inherit; }

        .app-container { max-width: 1450px; margin: 0 auto; padding: 40px 20px; display: none; }
        
        /* HEADER */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header-title { font-weight: 300; font-size: 1.5rem; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; }
        .btn-action { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }

        /* TABS */
        .tab-nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: transparent; border: none; color: var(--text); padding: 10px 0; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--primary); color: var(--text-light); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        /* JOURNAL GROUPING */
        .month-group-header { background: #111; padding: 10px 20px; border-left: 4px solid var(--primary); margin: 30px 0 10px 0; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; display: flex; justify-content: space-between; }
        
        /* CARDS & FORMS */
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        input, select, textarea, button { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; font-size: 0.8rem; font-family: inherit; }
        textarea { grid-column: span 2; height: 60px; resize: none; }
        .save-btn { background: #fff; color: #000; font-weight: 600; grid-column: span 2; cursor: pointer; border: none; padding: 15px; }
        
        .search-container { margin-bottom: 20px; }
        .search-bar { width: 100%; padding: 15px; background: var(--surface); border: 1px solid var(--border); color: #fff; box-sizing: border-box; font-size: 0.9rem; }

        /* TABLES */
        .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { color: #666; font-size: 0.6rem; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid var(--border); background: #050505; }
        td { padding: 12px; font-size: 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .lot-badge { background: #1a1a1a; padding: 2px 6px; border-radius: 3px; font-weight: 600; color: #fff; border: 1px solid #333; }
        
        /* CALENDAR */
        .calendar-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .cal-day { background: var(--surface); min-height: 90px; padding: 10px; border-top: 2px solid transparent; }
        .cal-day.profit { border-top-color: var(--positive); }
        .cal-day.loss { border-top-color: var(--negative); }

        .stat-card { background: var(--surface); padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { display: block; font-size: 1.2rem; color: #fff; margin-top: 5px; font-weight: 300; }

        /* ANALYTICS */
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }

        .img-preview { width: 45px; height: 32px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }
        .img-preview:hover { transform: scale(6); position: relative; z-index: 1000; border-color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="font-weight:300; letter-spacing:3px;">IDENTITY CHECK</h2>
        <input type="text" id="user-input" class="login-input" placeholder="USERNAME">
        <input type="password" id="pass-input" class="login-input" placeholder="PASSWORD">
        <button id="loginBtn" class="save-btn" style="width:100%;">ACCESS JOURNAL</button>
    </div>
</div>

<div class="app-container" id="main-content">
    <header class="header-top">
        <h1 class="header-title">JOURNAL // <span id="display-user"></span></h1>
        <div style="display:flex; gap:10px; align-items: center;">
            <select id="export-month" style="font-size:0.7rem;"></select>
            <select id="export-year" style="font-size:0.7rem;"></select>
            <button class="btn-action" style="background:#fff; color:#000;" onclick="ui.exportPDF()">PDF Report</button>
            <button class="btn-action" onclick="ui.undoLast()">Undo</button>
            <button class="btn-action" onclick="ui.resetAll()">Reset</button>
        </div>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" id="btn-journal" onclick="ui.switchTab('journal')">Journal History</button>
        <button class="tab-btn" id="btn-calendar" onclick="ui.switchTab('calendar')">Calendar View</button>
        <button class="tab-btn" id="btn-analytics" onclick="ui.switchTab('analytics')">Advanced Metrics</button>
    </nav>

    <div id="tab-journal" class="tab-content active">
        <div class="card" id="execution-form">
            <div class="form-grid">
                <input type="date" id="t-date">
                <input type="text" id="t-symbol" placeholder="Symbol (e.g. XAUUSD)">
                <select id="t-asset"><option value="100000">Forex</option><option value="1000">Gold</option><option value="10">Indices</option></select>
                <input type="number" id="t-lots" placeholder="Lots" step="0.01">
                <select id="t-side"><option value="BUY">Long</option><option value="SELL">Short</option></select>
                <input type="number" id="t-entry" placeholder="Entry Price" step="0.00001">
                <input type="number" id="t-sl" placeholder="Stop Loss" step="0.00001">
                <input type="number" id="t-tp" placeholder="Take Profit" step="0.00001">
                <div style="display:flex; flex-direction:column;">
                    <input type="number" id="t-exit" placeholder="Exit Price" step="0.00001">
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <button style="flex:1; font-size:0.6rem; color:var(--positive)" onclick="ui.quickHit('TP')">TP</button>
                        <button style="flex:1; font-size:0.6rem; color:var(--negative)" onclick="ui.quickHit('SL')">SL</button>
                    </div>
                </div>
                <select id="t-session"><option value="ASIAN">Asian</option><option value="LONDON">London</option><option value="NY">NY</option></select>
                <input type="file" id="t-img" accept="image/*" style="font-size:0.6rem">
                <textarea id="t-notes" placeholder="Execution notes..."></textarea>
                <button onclick="ui.handleNewTrade()" class="save-btn" id="saveBtn">Log Execution</button>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="trade-search" class="search-bar" placeholder="FILTER BY INSTRUMENT..." onkeyup="ui.renderJournal()">
        </div>
        
        <div id="journal-groups"></div>
    </div>

    <div id="tab-calendar" class="tab-content">
        <div class="calendar-layout">
            <div>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <select id="cal-month" onchange="ui.renderCalendar(); ui.updateSideStats();"></select>
                    <select id="cal-year" onchange="ui.renderCalendar(); ui.updateSideStats();"></select>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
            <div class="side-stats">
                <div class="stat-card">
                    <span class="stat-label">Daily P/L</span>
                    <div id="side-today" class="stat-val">$0</div>
                    <span id="side-today-meta" style="font-size:0.65rem; color:#666"></span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Weekly P/L</span>
                    <div id="side-week" class="stat-val">$0</div>
                    <span id="side-week-meta" style="font-size:0.65rem; color:#666"></span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Monthly P/L</span>
                    <div id="side-month" class="stat-val">$0</div>
                    <span id="side-month-meta" style="font-size:0.65rem; color:#666"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-analytics" class="tab-content">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <select id="ana-month" onchange="ui.renderAnalytics()"></select>
            <select id="ana-year" onchange="ui.renderAnalytics()"></select>
        </div>
        
        <div class="analytics-grid">
            <div class="stat-card"><span class="stat-label">Win Rate</span><span id="s-wr" class="stat-val">0%</span></div>
            <div class="stat-card"><span class="stat-label">Avg Profit</span><span id="s-avg-p" class="stat-val" style="color:var(--positive)">$0</span></div>
            <div class="stat-card"><span class="stat-label">Avg Loss</span><span id="s-avg-l" class="stat-val" style="color:var(--negative)">$0</span></div>
            <div class="stat-card"><span class="stat-label">Avg R:R</span><span id="s-avg-rr" class="stat-val" style="color:var(--primary)">0.00</span></div>
        </div>
        
        <div class="analytics-grid">
            <div class="stat-card"><span class="stat-label">Highest Profit</span><span id="s-hp" class="stat-val">$0</span></div>
            <div class="stat-card"><span class="stat-label">Highest Loss</span><span id="s-hl" class="stat-val">$0</span></div>
            <div class="stat-card"><span class="stat-label">Gross Profit</span><span id="s-gp" class="stat-val">$0</span></div>
            <div class="stat-card"><span class="stat-label">Gross Loss</span><span id="s-gl" class="stat-val">$0</span></div>
        </div>

        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
            <div class="card"><h3>Equity Curve</h3><canvas id="equityChart"></canvas></div>
            <div class="card"><h3>Session Performance</h3><canvas id="pieChart"></canvas></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, deleteDoc, doc, where, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxnZaZYUFSmN8TY-_JXsTOq5hqf3rMkaI",
        authDomain: "rk-journaling-trades.firebaseapp.com",
        projectId: "rk-journaling-trades",
        storageBucket: "rk-journaling-trades.firebasestorage.app",
        messagingSenderId: "769348692241",
        appId: "1:769348692241:web:804455307a5fedd82f84b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tradesCol = collection(db, "trades");

    let currentUser = null;
    let cachedTrades = [];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    document.getElementById('loginBtn').onclick = async () => {
        const u = document.getElementById('user-input').value.trim().toUpperCase();
        const p = document.getElementById('pass-input').value;
        const snap = await getDoc(doc(db, "users", u));
        if (snap.exists() && snap.data().password === p) {
            currentUser = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('display-user').innerText = u;
            ui.init();
        } else { alert("Auth Failed"); }
    };

    window.ui = {
        charts: {},
        init() {
            document.getElementById('t-date').valueAsDate = new Date();
            const mOpts = months.map((m,i)=>`<option value="${i}" ${i===new Date().getMonth()?'selected':''}>${m}</option>`).join('');
            const yOpts = [2025, 2026].map(y=>`<option value="${y}" ${y===new Date().getFullYear()?'selected':''}>${y}</option>`).join('');
            
            ['cal-month', 'ana-month', 'export-month'].forEach(id => {
                document.getElementById(id).innerHTML = (id!=='cal-month') ? `<option value="ALL">All Time</option>`+mOpts : mOpts;
            });
            ['cal-year', 'ana-year', 'export-year'].forEach(id => document.getElementById(id).innerHTML = yOpts);
            this.syncData();
        },
        async syncData() {
            const q = query(tradesCol, where("user_id", "==", currentUser), orderBy("date", "desc"));
            const snap = await getDocs(q);
            cachedTrades = snap.docs.map(d => ({...d.data(), id: d.id}));
            this.renderAll();
        },
        switchTab(id) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`btn-${id}`).classList.add('active');
            if(id === 'analytics') this.renderAnalytics();
            if(id === 'calendar') this.renderCalendar();
            if(id === 'journal') this.renderJournal();
        },
        renderAll() { this.renderJournal(); this.renderCalendar(); this.renderAnalytics(); this.updateSideStats(); },
        quickHit(type) { document.getElementById('t-exit').value = type === 'TP' ? document.getElementById('t-tp').value : document.getElementById('t-sl').value; },
        
        renderJournal() {
            const container = document.getElementById('journal-groups');
            const search = document.getElementById('trade-search').value.toUpperCase();
            container.innerHTML = '';
            
            const filtered = cachedTrades.filter(t => !search || t.symbol.includes(search));
            const groups = {};

            filtered.forEach(t => {
                const date = new Date(t.date);
                const key = `${months[date.getMonth()]} ${date.getFullYear()}`;
                if(!groups[key]) groups[key] = { trades: [], pnl: 0 };
                groups[key].trades.push(t);
                groups[key].pnl += t.profit;
            });

            Object.entries(groups).forEach(([monthYear, data]) => {
                let html = `
                    <div class="month-group-header">
                        <span>${monthYear}</span>
                        <span style="color:${data.pnl>=0?'var(--positive)':'var(--negative)'}">$${data.pnl.toFixed(2)}</span>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>Date</th><th>Symbol</th><th>Lots</th><th>Side</th><th>P/L ($)</th><th>R:R</th><th>Note</th></tr></thead>
                            <tbody>`;
                
                data.trades.forEach(t => {
                    const risk = Math.abs(t.entry - t.sl);
                    const reward = Math.abs(t.exit - t.entry);
                    const rr = risk > 0 ? (reward/risk).toFixed(2) : 'N/A';
                    
                    html += `
                        <tr>
                            <td>${t.date.split('-').slice(1).join('/')}</td>
                            <td><b>${t.symbol}</b></td>
                            <td><span class="lot-badge">${t.lots}</span></td>
                            <td style="color:${t.side==='BUY'?'var(--positive)':'var(--negative)'}">${t.side}</td>
                            <td style="color:${t.profit>=0?'var(--positive)':'var(--negative)'}">$${t.profit.toFixed(2)}</td>
                            <td>${rr}</td>
                            <td><div style="font-size:0.6rem; color:#666">${t.notes}</div></td>
                        </tr>`;
                });
                html += `</tbody></table></div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        },

        updateSideStats() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const selM = parseInt(document.getElementById('cal-month').value);
            const selY = parseInt(document.getElementById('cal-year').value);
            const isCurr = (selM === now.getMonth() && selY === now.getFullYear());

            const calc = (list) => ({ pnl: list.reduce((s,t)=>s+t.profit, 0), wr: list.length ? Math.round((list.filter(t=>t.profit>0).length/list.length)*100) : 0, count: list.length });
            
            const setUI = (id, metaId, d, na) => {
                document.getElementById(id).innerText = na ? "N/A" : (d.pnl>=0?'+$':'-$')+Math.abs(d.pnl).toFixed(0);
                document.getElementById(id).style.color = na ? "#666" : (d.pnl>=0?'var(--positive)':'var(--negative)');
                document.getElementById(metaId).innerText = na ? "Out of Scope" : `${d.wr}% WR | ${d.count} Trades`;
            };

            setUI('side-today', 'side-today-meta', calc(cachedTrades.filter(t=>t.date===todayStr)), !isCurr);
            const first = now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1);
            const monStr = new Date(new Date().setDate(first)).toISOString().split('T')[0];
            setUI('side-week', 'side-week-meta', calc(cachedTrades.filter(t=>t.date >= monStr)), !isCurr);
            setUI('side-month', 'side-month-meta', calc(cachedTrades.filter(t=>{ const d=new Date(t.date); return d.getMonth()===selM && d.getFullYear()===selY })), false);
        },

        renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const m = parseInt(document.getElementById('cal-month').value), y = parseInt(document.getElementById('cal-year').value);
            const days = new Date(y, m + 1, 0).getDate();
            for (let i = 1; i <= days; i++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dayPL = cachedTrades.filter(t => t.date === dStr).reduce((s, t) => s + t.profit, 0);
                grid.innerHTML += `<div class="cal-day ${dayPL!==0?(dayPL>0?'profit':'loss'):''}"><b>${i}</b>${dayPL!==0?`<div style="font-size:0.7rem; color:${dayPL>0?'var(--positive)':'var(--negative)'}">$${dayPL.toFixed(0)}</div>`:''}</div>`;
            }
        },

        renderAnalytics() {
            const selM = document.getElementById('ana-month').value;
            const selY = parseInt(document.getElementById('ana-year').value);
            const data = cachedTrades.filter(t => selM === 'ALL' ? true : (new Date(t.date).getMonth() === parseInt(selM) && new Date(t.date).getFullYear() === selY));

            let wins = [], losses = [], rrs = [], cumulative = [0], labels = ['Start'];
            let sess = { ASIAN: 0, LONDON: 0, NY: 0 };

            data.slice().reverse().forEach(t => {
                if(t.profit > 0) wins.push(t.profit); else losses.push(Math.abs(t.profit));
                const risk = Math.abs(t.entry - t.sl);
                if(risk > 0) rrs.push(Math.abs(t.exit - t.entry) / risk);
                cumulative.push(cumulative[cumulative.length-1] + t.profit);
                labels.push(t.date);
                sess[t.session]++;
            });

            const avgP = wins.length ? wins.reduce((a,b)=>a+b,0)/wins.length : 0;
            const avgL = losses.length ? losses.reduce((a,b)=>a+b,0)/losses.length : 0;
            const avgRR = rrs.length ? rrs.reduce((a,b)=>a+b,0)/rrs.length : 0;

            document.getElementById('s-wr').innerText = data.length ? Math.round((wins.length/data.length)*100)+'%' : '0%';
            document.getElementById('s-avg-p').innerText = `$${avgP.toFixed(2)}`;
            document.getElementById('s-avg-l').innerText = `-$${avgL.toFixed(2)}`;
            document.getElementById('s-avg-rr').innerText = avgRR.toFixed(2);
            document.getElementById('s-hp').innerText = `$${wins.length ? Math.max(...wins).toFixed(0) : 0}`;
            document.getElementById('s-hl').innerText = `-$${losses.length ? Math.max(...losses).toFixed(0) : 0}`;
            document.getElementById('s-gp').innerText = `$${wins.reduce((a,b)=>a+b,0).toFixed(0)}`;
            document.getElementById('s-gl').innerText = `-$${losses.reduce((a,b)=>a+b,0).toFixed(0)}`;

            this.updateCharts(cumulative, labels, sess);
        },

        updateCharts(data, labels, sess) {
            if(this.charts.equity) this.charts.equity.destroy();
            this.charts.equity = new Chart(document.getElementById('equityChart'), { type: 'line', data: { labels, datasets: [{ data, borderColor: '#fff', fill: true, backgroundColor: 'rgba(255,255,255,0.05)', tension: 0.1, pointRadius: 0 }] }, options: { scales: { x: { display: false }, y: { grid: { color: '#111' } } }, plugins: { legend: { display: false } } } });
            if(this.charts.pie) this.charts.pie.destroy();
            this.charts.pie = new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels: Object.keys(sess), datasets: [{ data: Object.values(sess), backgroundColor: ['#333', '#666', '#fff'], borderWidth: 0 }] }, options: { plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { size: 10 } } } } } });
        },

        async handleNewTrade() {
            const btn = document.getElementById('saveBtn'); btn.innerText = "Syncing...";
            const entry = parseFloat(document.getElementById('t-entry').value), exit = parseFloat(document.getElementById('t-exit').value);
            const lots = parseFloat(document.getElementById('t-lots').value), mult = parseFloat(document.getElementById('t-asset').value);
            const trade = {
                user_id: currentUser, symbol: document.getElementById('t-symbol').value.toUpperCase(),
                lots: lots, side: document.getElementById('t-side').value, session: document.getElementById('t-session').value,
                profit: (exit - entry) * lots * mult * (document.getElementById('t-side').value === 'BUY' ? 1 : -1),
                date: document.getElementById('t-date').value, entry: entry, sl: parseFloat(document.getElementById('t-sl').value),
                exit: exit, notes: document.getElementById('t-notes').value, timestamp: Date.now()
            };
            await addDoc(tradesCol, trade);
            btn.innerText = "Log Execution";
            this.syncData();
        },
        async undoLast() { if(confirm("Delete last?")) { const q = query(tradesCol, where("user_id", "==", currentUser), orderBy("timestamp", "desc"), limit(1)); const snap = await getDocs(q); if(!snap.empty) await deleteDoc(doc(db, "trades", snap.docs[0].id)); this.syncData(); } },
        async resetAll() { if(confirm("Wipe all data?")) { const batch = writeBatch(db); const snap = await getDocs(query(tradesCol, where("user_id", "==", currentUser))); snap.docs.forEach(d => batch.delete(d.ref)); await batch.commit(); this.syncData(); } }
    };
</script>
</body>
</html>
