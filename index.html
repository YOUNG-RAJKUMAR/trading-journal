<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOURNAL// Pro Multi-User</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #000000; --surface: #0a0a0a; --border: #222222;
            --primary: #ffffff; --negative: #ff4444; --positive: #44ff88; 
            --text: #cccccc; --text-light: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; width: 350px; text-align: center; }
        .login-input { width: 100%; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; box-sizing: border-box; }

        .app-container { max-width: 1450px; margin: 0 auto; padding: 40px 20px; display: none; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .btn-action { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-action:hover { background: #fff; color: #000; }

        .tab-nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: transparent; border: none; color: var(--text); padding: 10px 0; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--primary); color: var(--text-light); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        input, select, textarea, button { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; font-size: 0.8rem; font-family: inherit; }
        
        .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { color: #666; font-size: 0.65rem; text-transform: uppercase; padding: 15px; text-align: left; border-bottom: 1px solid var(--border); background: #050505; }
        td { padding: 15px; font-size: 0.8rem; border-bottom: 1px solid var(--border); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .cal-day { background: var(--surface); min-height: 100px; padding: 10px; border-top: 2px solid transparent; display: flex; flex-direction: column; gap: 4px; }
        .cal-day.profit { border-top-color: var(--positive); }
        .cal-day.loss { border-top-color: var(--negative); }
        .cal-meta { font-size: 0.65rem; color: #555; text-transform: uppercase; }

        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 20px; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .stat-val { display: block; font-size: 1.4rem; color: #fff; margin-top: 5px; }
        .img-preview { width: 45px; height: 32px; object-fit: cover; border: 1px solid var(--border); }

        /* PDF COVER */
        #pdf-cover { display: none; background: #000; color: #fff; text-align: center; padding: 120px; height: 1050px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="font-weight:300; letter-spacing:3px;">IDENTITY CHECK</h2>
        <input type="text" id="user-input" class="login-input" placeholder="USERNAME">
        <input type="password" id="pass-input" class="login-input" placeholder="PASSWORD">
        <button id="loginBtn" style="background:#fff; color:#000; border:none; padding:15px; width:100%; cursor:pointer; font-weight:600;">ACCESS JOURNAL</button>
    </div>
</div>

<div class="app-container" id="main-content">
    <div id="pdf-cover">
        <h1 style="font-size: 4.5rem; letter-spacing: 18px; font-weight: 300; margin-top: 150px;">PERFORMANCE REPORT</h1>
        <div style="width: 100px; height: 1px; background: #fff; margin: 50px auto;"></div>
        <p style="letter-spacing: 8px; color: #888;">USER: <span id="pdf-user-display" style="color:#fff"></span></p>
        <p id="pdf-timestamp" style="margin-top: 350px; color: #333; font-size: 0.75rem; letter-spacing: 2px;"></p>
    </div>

    <header class="header-top no-pdf">
        <h1 style="font-weight:300; letter-spacing:2px;">JOURNAL // <span id="display-user"></span></h1>
        <div style="display:flex; gap:10px">
            <button class="btn-action" onclick="ui.undoLast()">Undo</button>
            <button class="btn-action" onclick="ui.resetAll()">Wipe Cloud</button>
            <button class="btn-action" id="pdf-trigger" style="background:#fff; color:#000" onclick="ui.exportPDF()">Export PDF</button>
            <button class="btn-action" onclick="location.reload()">Logout</button>
        </div>
    </header>

    <nav class="tab-nav no-pdf">
        <button class="tab-btn active" onclick="ui.switchTab('journal')">Journal</button>
        <button class="tab-btn" onclick="ui.switchTab('calendar')">Calendar</button>
        <button class="tab-btn" onclick="ui.switchTab('analytics')">Analytics</button>
    </nav>

    <div id="tab-journal" class="tab-content active">
        <div class="card no-pdf">
            <div class="form-grid">
                <input type="date" id="t-date">
                <input type="time" id="t-start"><input type="time" id="t-end">
                <select id="t-session"><option value="ASIAN">Asian</option><option value="LONDON">London</option><option value="NY">NY</option></select>
                <input type="text" id="t-symbol" placeholder="Symbol">
                <select id="t-asset"><option value="100000">Forex</option><option value="1000">Gold</option><option value="10">Indices</option></select>
                <input type="number" id="t-lots" placeholder="Lots" step="0.01">
                <select id="t-side"><option value="BUY">Long</option><option value="SELL">Short</option></select>
                <input type="number" id="t-entry" placeholder="Entry Price"><input type="number" id="t-exit" placeholder="Exit Price">
                <input type="file" id="t-img" accept="image/*" style="font-size:0.6rem">
                <textarea id="t-notes" placeholder="Notes..." style="grid-column: span 2; height: 40px;"></textarea>
                <button onclick="ui.handleNewTrade()" id="saveBtn" style="background:#fff; color:#000; font-weight:600; cursor:pointer; grid-column: span 2; border:none; padding:12px;">Sync Trade</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Date</th><th>Symbol</th><th>Lots</th><th>Side</th><th>Session</th><th>P/L ($)</th><th>Duration</th><th>Media/Notes</th></tr></thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-calendar" class="tab-content">
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div id="tab-analytics" class="tab-content">
        <div class="analytics-grid">
            <div class="stat-card"><span class="stat-label">Total P/L</span><span id="s-tpnl" class="stat-val">$0</span></div>
            <div class="stat-card"><span class="stat-label">Win Rate</span><span id="s-wr" class="stat-val">0%</span></div>
            <div class="stat-card"><span class="stat-label">Trades Today</span><span id="s-today-count" class="stat-val" style="color:var(--primary)">0</span></div>
            <div class="stat-card"><span class="stat-label">Profit Factor</span><span id="s-pf" class="stat-val">0.00</span></div>
            <div class="stat-card"><span class="stat-label">Gross Profit</span><span id="s-gp" class="stat-val" style="color:var(--positive)">$0</span></div>
            <div class="stat-card"><span class="stat-label">Gross Loss</span><span id="s-gl" class="stat-val" style="color:var(--negative)">$0</span></div>
        </div>
        <div class="card" style="height:350px;"><canvas id="equityChart"></canvas></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, doc, getDoc, deleteDoc, limit, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxnZaZYUFSmN8TY-_JXsTOq5hqf3rMkaI",
        authDomain: "rk-journaling-trades.firebaseapp.com",
        projectId: "rk-journaling-trades",
        storageBucket: "rk-journaling-trades.firebasestorage.app",
        messagingSenderId: "769348692241",
        appId: "1:769348692241:web:804455307a5fedd82f84b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tradesCol = collection(db, "trades");

    let currentUser = null;
    let myChart = null;

    document.getElementById('loginBtn').onclick = async () => {
        const u = document.getElementById('user-input').value.trim().toUpperCase();
        const p = document.getElementById('pass-input').value;
        const snap = await getDoc(doc(db, "users", u));
        if (snap.exists() && snap.data().password === p) {
            currentUser = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('display-user').innerText = u;
            ui.init();
        } else { alert("Login Denied"); }
    };

    window.ui = {
        init() { 
            document.getElementById('t-date').valueAsDate = new Date();
            this.renderAll(); 
        },
        switchTab(id) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${id}`).classList.add('active');
        },
        async handleNewTrade() {
            const btn = document.getElementById('saveBtn'); btn.innerText = "Syncing...";
            const file = document.getElementById('t-img').files[0];
            let imgData = "";
            if(file) {
                const reader = new FileReader();
                imgData = await new Promise(r => { reader.readAsDataURL(file); reader.onload = e => r(e.target.result); });
            }

            const entry = parseFloat(document.getElementById('t-entry').value);
            const exit = parseFloat(document.getElementById('t-exit').value);
            const pnl = (exit - entry) * parseFloat(document.getElementById('t-lots').value) * parseFloat(document.getElementById('t-asset').value) * (document.getElementById('t-side').value === 'BUY' ? 1 : -1);
            
            const tStart = document.getElementById('t-start').value, tEnd = document.getElementById('t-end').value;
            let dur = 0; if(tStart && tEnd) {
                const [h1, m1] = tStart.split(':'), [h2, m2] = tEnd.split(':');
                dur = (parseInt(h2)*60 + parseInt(m2)) - (parseInt(h1)*60 + parseInt(m1)); if(dur < 0) dur += 1440;
            }

            await addDoc(tradesCol, {
                user_id: currentUser, date: document.getElementById('t-date').value,
                symbol: document.getElementById('t-symbol').value.toUpperCase(),
                side: document.getElementById('t-side').value, session: document.getElementById('t-session').value,
                lots: document.getElementById('t-lots').value, profit: pnl, duration: dur, 
                notes: document.getElementById('t-notes').value, img: imgData, timestamp: Date.now()
            });
            btn.innerText = "Sync Trade"; this.renderAll();
        },
        async renderAll() {
            const q = query(tradesCol, where("user_id", "==", currentUser), orderBy("date", "desc"));
            const snap = await getDocs(q);
            const trades = snap.docs.map(d => d.data());

            const body = document.getElementById('tradeBody'); body.innerHTML = '';
            let total = 0, wins = 0, curve = [0], gP = 0, gL = 0, todayCount = 0;
            const todayStr = new Date().toISOString().split('T')[0];
            
            [...trades].reverse().forEach(t => {
                total += t.profit;
                if(t.profit > 0) { wins++; gP += t.profit; } else gL += Math.abs(t.profit);
                if(t.date === todayStr) todayCount++;
                curve.push(total);
                body.insertAdjacentHTML('afterbegin', `<tr><td>${t.date}</td><td>${t.symbol}</td><td>${t.lots}</td><td style="color:${t.side==='BUY'?'var(--positive)':'var(--negative)'}">${t.side}</td><td>${t.session}</td><td style="color:${t.profit>=0?'var(--positive)':'var(--negative)'}">$${t.profit.toFixed(2)}</td><td>${t.duration}m</td><td>${t.img ? `<img src="${t.img}" class="img-preview">` : ''} <div style="font-size:0.65rem; color:#666">${t.notes}</div></td></tr>`);
            });

            document.getElementById('s-wr').innerText = trades.length ? Math.round((wins/trades.length)*100)+'%' : '0%';
            document.getElementById('s-tpnl').innerText = '$' + total.toFixed(2);
            document.getElementById('s-pf').innerText = gL > 0 ? (gP/gL).toFixed(2) : gP.toFixed(2);
            document.getElementById('s-today-count').innerText = todayCount;
            document.getElementById('s-gp').innerText = '$' + gP.toFixed(0);
            document.getElementById('s-gl').innerText = '-$' + gL.toFixed(0);
            
            this.updateChart(curve, trades.map(t => t.date).reverse());
            this.renderCalendar(trades);
        },
        renderCalendar(trades) {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                const dStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dayTrades = trades.filter(t => t.date === dStr);
                const dayPL = dayTrades.reduce((s, t) => s + t.profit, 0);
                
                grid.innerHTML += `
                    <div class="cal-day ${dayPL!==0?(dayPL>0?'profit':'loss'):''}">
                        <b>${i}</b>
                        ${dayPL !== 0 ? `<div style="font-size:0.75rem; color:${dayPL>0?'var(--positive)':'var(--negative)'}">$${dayPL.toFixed(0)}</div>` : ''}
                        ${dayTrades.length > 0 ? `<div class="cal-meta">${dayTrades.length} TRDS</div>` : ''}
                    </div>`;
            }
        },
        updateChart(data, labels) {
            const ctx = document.getElementById('equityChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels.length ? labels : ['0'], datasets: [{ data, borderColor: '#fff', tension: 0.1, pointRadius: 2, fill: true, backgroundColor: 'rgba(255,255,255,0.02)' }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#1a1a1a' } } } }
            });
        },
        async undoLast() {
            if(!confirm("Undo last trade?")) return;
            const q = query(tradesCol, where("user_id", "==", currentUser), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            if(!snap.empty) { await deleteDoc(doc(db, "trades", snap.docs[0].id)); this.renderAll(); }
        },
        async resetAll() {
            if(confirm("Wipe ALL cloud data?")) {
                const batch = writeBatch(db);
                const q = query(tradesCol, where("user_id", "==", currentUser));
                const snap = await getDocs(q); snap.docs.forEach(d => batch.delete(d.ref));
                await batch.commit(); this.renderAll();
            }
        },
        exportPDF() {
            const original = document.getElementById('main-content');
            const btn = document.getElementById('pdf-trigger');
            btn.innerText = "CAPTURING...";

            const clone = original.cloneNode(true);
            clone.style.display = "block";
            clone.style.background = "#000000";
            clone.style.width = "1400px";

            const cover = clone.querySelector('#pdf-cover');
            cover.style.display = "block";
            clone.querySelector('#pdf-user-display').innerText = currentUser;
            clone.querySelector('#pdf-timestamp').innerText = "SYSTEM GENERATED: " + new Date().toLocaleString().toUpperCase();

            clone.querySelectorAll('.tab-content').forEach(t => {
                t.style.display = "block";
                t.style.pageBreakBefore = "always";
                t.style.padding = "40px";
            });
            clone.querySelectorAll('.no-pdf').forEach(el => el.remove());

            clone.style.position = "absolute";
            clone.style.left = "-9999px";
            document.body.appendChild(clone);

            const opt = {
                margin: 0,
                filename: `REPORT_${currentUser}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#000000' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(clone).save().then(() => {
                document.body.removeChild(clone);
                btn.innerText = "Export PDF";
            });
        }
    };
</script>
</body>
</html>
