<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOURNAL // Professional Multi-User</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #000000; --surface: #0a0a0a; --border: #222222;
            --primary: #ffffff; --negative: #ff4444; --positive: #44ff88; 
            --text: #cccccc; --text-light: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; width: 100%; max-width: 350px; text-align: center; }
        .login-input { width: 100%; margin-bottom: 15px; box-sizing: border-box; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: inherit; }

        .app-container { max-width: 1450px; margin: 0 auto; padding: 40px 20px; display: none; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header-title { font-weight: 300; font-size: 1.5rem; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; }

        .btn-action { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }

        .tab-nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: transparent; border: none; color: var(--text); padding: 10px 0; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--primary); color: var(--text-light); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        input, select, textarea, button { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; font-size: 0.8rem; font-family: inherit; }
        
        .hit-btn { padding: 4px; font-size: 0.6rem; cursor: pointer; background: #111; margin-top: 5px; flex: 1; border: 1px solid #333; }
        .save-btn { background: #fff; color: #000; font-weight: 600; grid-column: span 2; cursor: pointer; border: none; padding: 15px; }

        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 20px; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .stat-val { display: block; font-size: 1.3rem; color: #fff; margin-top: 5px; font-weight: 300; }

        .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { color: #666; font-size: 0.65rem; text-transform: uppercase; padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 15px; font-size: 0.8rem; border-bottom: 1px solid var(--border); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .cal-day { background: var(--surface); min-height: 100px; padding: 10px; border-top: 2px solid transparent; }
        .cal-day.profit { border-top-color: var(--positive); }
        .cal-day.loss { border-top-color: var(--negative); }

        @media print { .no-print { display: none !important; } .tab-content { display: block !important; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="font-weight:300; letter-spacing:3px;">IDENTITY CHECK</h2>
        <input type="text" id="user-input" class="login-input" placeholder="USERNAME">
        <input type="password" id="pass-input" class="login-input" placeholder="PASSWORD">
        <button id="loginBtn" class="save-btn" style="width:100%;">ACCESS JOURNAL</button>
    </div>
</div>

<div class="app-container" id="main-content">
    <header class="header-top">
        <h1 class="header-title">JOURNAL // <span id="display-user"></span></h1>
        <div style="display:flex; gap:10px" class="no-print">
            <button class="btn-action" style="background:#fff; color:#000" onclick="ui.exportPDF()">Export Full Report</button>
            <button class="btn-action" onclick="location.reload()">Logout</button>
        </div>
    </header>

    <nav class="tab-nav no-print">
        <button class="tab-btn active" id="btn-journal" onclick="ui.switchTab('journal')">Journal</button>
        <button class="tab-btn" id="btn-calendar" onclick="ui.switchTab('calendar')">Calendar</button>
        <button class="tab-btn" id="btn-analytics" onclick="ui.switchTab('analytics')">Data & Charts</button>
    </nav>

    <div id="tab-journal" class="tab-content active">
        <div class="card no-print">
            <div class="form-grid">
                <input type="date" id="t-date">
                <input type="time" id="t-start">
                <input type="time" id="t-end">
                <select id="t-session"><option value="ASIAN">Asian</option><option value="LONDON">London</option><option value="NY">NY</option></select>
                <input type="text" id="t-symbol" placeholder="Symbol">
                <select id="t-asset"><option value="100000">Forex</option><option value="1000">Gold</option><option value="10">Indices</option></select>
                <input type="number" id="t-lots" placeholder="Lots" step="0.01">
                <select id="t-side"><option value="BUY">Long</option><option value="SELL">Short</option></select>
                <input type="number" id="t-entry" placeholder="Entry Price">
                <input type="number" id="t-sl" placeholder="Stop Loss">
                <input type="number" id="t-tp" placeholder="Take Profit">
                <div>
                    <input type="number" id="t-exit" placeholder="Exit Price">
                    <div style="display:flex; gap:5px;">
                        <button class="hit-btn" style="color:var(--positive)" onclick="ui.quickHit('TP')">TP Hit</button>
                        <button class="hit-btn" style="color:var(--negative)" onclick="ui.quickHit('SL')">SL Hit</button>
                    </div>
                </div>
                <textarea id="t-notes" placeholder="Trade Notes..."></textarea>
                <button onclick="ui.handleNewTrade()" class="save-btn" id="saveBtn">Log Execution</button>
            </div>
        </div>
        <div class="table-wrap">
            <table id="tradeTable">
                <thead><tr><th>Date</th><th>Symbol</th><th>Side</th><th>Session</th><th>P/L ($)</th><th>Notes</th></tr></thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-calendar" class="tab-content">
        <div style="margin-bottom:20px; display:flex; gap:10px;">
            <select id="cal-month" onchange="ui.renderCalendar()"></select>
            <select id="cal-year" onchange="ui.renderCalendar()"></select>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div id="tab-analytics" class="tab-content">
        <div style="margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; gap:10px;">
                <select id="ana-month" onchange="ui.refreshAnalytics()"><option value="ALL">All Time</option></select>
                <select id="ana-year" onchange="ui.refreshAnalytics()"></select>
            </div>
            <button class="btn-action" onclick="ui.exportPDF('tab-analytics')">Export Monthly PDF</button>
        </div>
        <div class="analytics-grid">
            <div class="stat-card"><span class="stat-label">Gross Profit</span><span id="s-gp" class="stat-val" style="color:var(--positive)">$0</span></div>
            <div class="stat-card"><span class="stat-label">Gross Loss</span><span id="s-gl" class="stat-val" style="color:var(--negative)">$0</span></div>
            <div class="stat-card"><span class="stat-label">Net P/L</span><span id="s-net" class="stat-val">$0</span></div>
            <div class="stat-card"><span class="stat-label">Win Rate</span><span id="s-wr" class="stat-val">0%</span></div>
        </div>
        <div class="card">
            <h3>Equity Curve</h3>
            <canvas id="equityChart" height="100"></canvas>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxnZaZYUFSmN8TY-_JXsTOq5hqf3rMkaI",
        authDomain: "rk-journaling-trades.firebaseapp.com",
        projectId: "rk-journaling-trades",
        storageBucket: "rk-journaling-trades.firebasestorage.app",
        messagingSenderId: "769348692241",
        appId: "1:769348692241:web:804455307a5fedd82f84b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tradesCol = collection(db, "trades");

    let currentUser = null;
    let cachedTrades = [];

    window.ui = {
        charts: {},
        async init() {
            document.getElementById('t-date').valueAsDate = new Date();
            const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            const mOpts = months.map((m,i)=>`<option value="${i}" ${i===new Date().getMonth()?'selected':''}>${m}</option>`).join('');
            
            document.getElementById('cal-month').innerHTML = mOpts;
            document.getElementById('ana-month').insertAdjacentHTML('beforeend', mOpts);
            
            const yOpts = [2024, 2025, 2026].map(y=>`<option value="${y}" ${y===new Date().getFullYear()?'selected':''}>${y}</option>`).join('');
            document.getElementById('cal-year').innerHTML = yOpts;
            document.getElementById('ana-year').innerHTML = yOpts;

            await this.loadData();
        },

        quickHit(type) {
            document.getElementById('t-exit').value = type === 'TP' ? document.getElementById('t-tp').value : document.getElementById('t-sl').value;
        },

        switchTab(id) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`btn-${id}`).classList.add('active');
            if(id === 'calendar') this.renderCalendar();
            if(id === 'analytics') this.refreshAnalytics();
        },

        async loadData() {
            const q = query(tradesCol, where("user_id", "==", currentUser), orderBy("date", "desc"));
            const snap = await getDocs(q);
            cachedTrades = snap.docs.map(d => ({...d.data(), id: d.id}));
            this.renderJournal();
        },

        renderJournal() {
            const body = document.getElementById('tradeBody'); body.innerHTML = '';
            cachedTrades.forEach(t => {
                body.innerHTML += `<tr><td>${t.date}</td><td><b>${t.symbol}</b></td><td style="color:${t.side==='BUY'?'var(--positive)':'var(--negative)'}">${t.side}</td><td>${t.session}</td><td style="color:${t.profit>=0?'var(--positive)':'var(--negative)'}">$${t.profit.toFixed(2)}</td><td>${t.notes}</td></tr>`;
            });
        },

        renderCalendar() {
            const m = parseInt(document.getElementById('cal-month').value);
            const y = parseInt(document.getElementById('cal-year').value);
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const days = new Date(y, m + 1, 0).getDate();

            for (let i = 1; i <= days; i++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dayTrades = cachedTrades.filter(t => t.date === dStr);
                const pnl = dayTrades.reduce((s,t) => s + t.profit, 0);
                grid.innerHTML += `<div class="cal-day ${pnl!==0?(pnl>0?'profit':'loss'):''}"><b>${i}</b>${pnl!==0?`<div style="font-size:0.8rem; color:${pnl>0?'var(--positive)':'var(--negative)'}">$${pnl.toFixed(0)}</div>`:''}</div>`;
            }
        },

        refreshAnalytics() {
            const selMonth = document.getElementById('ana-month').value;
            const selYear = document.getElementById('ana-year').value;
            let filtered = cachedTrades;

            if(selMonth !== 'ALL') {
                filtered = cachedTrades.filter(t => {
                    const d = new Date(t.date);
                    return d.getMonth() == selMonth && d.getFullYear() == selYear;
                });
            }

            let gp = 0, gl = 0, wins = 0, cumulative = [0];
            [...filtered].reverse().forEach(t => {
                if(t.profit > 0) { gp += t.profit; wins++; } else { gl += Math.abs(t.profit); }
                cumulative.push(cumulative[cumulative.length-1] + t.profit);
            });

            document.getElementById('s-gp').innerText = `+$${gp.toFixed(2)}`;
            document.getElementById('s-gl').innerText = `-$${gl.toFixed(2)}`;
            document.getElementById('s-net').innerText = `$${(gp - gl).toFixed(2)}`;
            document.getElementById('s-wr').innerText = filtered.length ? Math.round((wins/filtered.length)*100)+'%' : '0%';
            
            this.updateChart(cumulative);
        },

        updateChart(data) {
            if(this.charts.equity) this.charts.equity.destroy();
            this.charts.equity = new Chart(document.getElementById('equityChart'), {
                type: 'line', data: { labels: data.map((_,i)=>i), datasets: [{ data, borderColor: '#fff', tension: 0.1, fill: true, backgroundColor: 'rgba(255,255,255,0.05)' }] },
                options: { scales: { x: { display: false }, y: { grid: { color: '#222' } } }, plugins: { legend: { display: false } } }
            });
        },

        async handleNewTrade() {
            const entry = parseFloat(document.getElementById('t-entry').value);
            const exit = parseFloat(document.getElementById('t-exit').value);
            const lots = parseFloat(document.getElementById('t-lots').value);
            const mult = parseFloat(document.getElementById('t-asset').value);
            const side = document.getElementById('t-side').value;

            const trade = {
                user_id: currentUser,
                date: document.getElementById('t-date').value,
                symbol: document.getElementById('t-symbol').value.toUpperCase(),
                lots, side, session: document.getElementById('t-session').value,
                profit: (exit - entry) * lots * mult * (side === 'BUY' ? 1 : -1),
                risk: Math.abs(entry - parseFloat(document.getElementById('t-sl').value)) * lots * mult,
                notes: document.getElementById('t-notes').value
            };

            await addDoc(tradesCol, trade);
            await this.loadData();
            alert("Trade Saved");
        },

        async exportPDF(id = 'main-content') {
            const element = document.getElementById(id);
            const opt = { margin: 10, filename: 'Trading_Report.pdf', html2canvas: { scale: 2, backgroundColor: '#000' }, jsPDF: { orientation: 'landscape' } };
            html2pdf().set(opt).from(element).save();
        }
    };

    document.getElementById('loginBtn').onclick = async () => {
        const u = document.getElementById('user-input').value.trim().toUpperCase();
        const p = document.getElementById('pass-input').value;
        const btn = document.getElementById('loginBtn');
        btn.innerText = "AUTHENTICATING...";
        const snap = await getDoc(doc(db, "users", u));
        if (snap.exists() && snap.data().password === p) {
            currentUser = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('display-user').innerText = u;
            ui.init();
        } else { alert("Access Denied"); btn.innerText = "ACCESS JOURNAL"; }
    };
</script>
</body>
</html>
