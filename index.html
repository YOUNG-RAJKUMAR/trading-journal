<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOURNAL// Pro Multi-User</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #000000; --surface: #0a0a0a; --border: #222222;
            --primary: #ffffff; --negative: #ff4444; --positive: #44ff88; 
            --text: #cccccc; --text-light: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; width: 100%; max-width: 350px; text-align: center; }
        .login-input { width: 100%; margin-bottom: 15px; box-sizing: border-box; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; }

        .app-container { max-width: 1450px; margin: 0 auto; padding: 40px 20px; display: none; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header-title { font-weight: 300; font-size: 1.5rem; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; }
        .btn-action { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-action:hover { border-color: #fff; color: #fff; }

        .tab-nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: transparent; border: none; color: var(--text); padding: 10px 0; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--primary); color: var(--text-light); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; font-size: 0.8rem; font-family: inherit; }
        
        .calendar-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .cal-day { background: var(--surface); min-height: 90px; padding: 10px; border-top: 2px solid transparent; position: relative; }
        .cal-day.profit { border-top-color: var(--positive); }
        .cal-day.loss { border-top-color: var(--negative); }

        .stat-card { background: var(--surface); padding: 20px; border: 1px solid var(--border); margin-bottom: 12px; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { display: block; font-size: 1.4rem; color: #fff; margin-top: 5px; font-weight: 300; }
        .stat-sub { font-size: 0.7rem; color: #666; display: block; margin-top: 4px; border-top: 1px solid #1a1a1a; padding-top: 4px; }

        .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 15px; font-size: 0.7rem; color: #666; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; font-size: 0.8rem; border-bottom: 1px solid var(--border); }

        .img-preview { width: 40px; height: 25px; object-fit: cover; border: 1px solid var(--border); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

        /* PDF Export Tweaks */
        .pdf-export-mode .tab-content { display: block !important; margin-top: 20px; }
        .pdf-export-mode .tab-nav, .pdf-export-mode .header-top { display: none; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="font-weight:300; letter-spacing:2px;">IDENTITY CHECK</h2>
        <input type="text" id="user-input" class="login-input" placeholder="USERNAME">
        <input type="password" id="pass-input" class="login-input" placeholder="PASSWORD">
        <button id="loginBtn" class="btn-action" style="width:100%; background:#fff; color:#000; padding:15px; font-weight:600">ACCESS JOURNAL</button>
    </div>
</div>

<div class="app-container" id="main-content">
    <header class="header-top">
        <h1 class="header-title">JOURNAL // <span id="display-user"></span></h1>
        <div style="display:flex; gap:10px">
            <button class="btn-action" onclick="ui.undoLast()">Undo</button>
            <button class="btn-action" style="background:#fff; color:#000" id="pdfBtn" onclick="ui.exportPDF()">Export PDF</button>
            <button class="btn-action" onclick="location.reload()">Logout</button>
        </div>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="ui.switchTab('journal', this)">Journal</button>
        <button class="tab-btn" onclick="ui.switchTab('calendar', this)">Calendar</button>
        <button class="tab-btn" onclick="ui.switchTab('analytics', this)">Analytics</button>
    </nav>

    <div id="tab-journal" class="tab-content active">
        <div class="card">
            <div class="form-grid">
                <input type="date" id="t-date">
                <input type="text" id="t-symbol" placeholder="Symbol">
                <input type="number" id="t-lots" placeholder="Lots" step="0.01">
                <select id="t-side"><option value="BUY">Long</option><option value="SELL">Short</option></select>
                <input type="number" id="t-profit" placeholder="P/L ($)">
                <select id="t-session"><option value="ASIAN">Asian</option><option value="LONDON">London</option><option value="NY">NY</option></select>
                <input type="file" id="t-img" accept="image/*" style="font-size:0.6rem">
                <button onclick="ui.saveTrade()" class="btn-action" style="background:#fff; color:#000">Log Execution</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Date</th><th>Symbol</th><th>Side</th><th>Session</th><th>P/L ($)</th><th>Media</th></tr></thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-calendar" class="tab-content">
        <div class="calendar-layout">
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="side-stats">
                <div class="stat-card">
                    <span class="stat-label">Today P/L</span>
                    <div id="side-today" class="stat-val">$0</div>
                    <span id="cnt-today" class="stat-sub">0 Trades Today</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Weekly P/L</span>
                    <div id="side-week" class="stat-val">$0</div>
                    <span id="cnt-week" class="stat-sub">0 Trades This Week</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Monthly P/L</span>
                    <div id="side-month" class="stat-val">$0</div>
                    <span id="cnt-month" class="stat-sub">0 Trades This Month</span>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-analytics" class="tab-content">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-bottom:25px;">
            <div class="stat-card"><span class="stat-label">Total Trades</span><div id="an-total" class="stat-val">0</div></div>
            <div class="stat-card"><span class="stat-label">Win Rate</span><div id="an-wr" class="stat-val">0%</div></div>
            <div class="stat-card"><span class="stat-label">Gross Profit</span><div id="an-gp" class="stat-val" style="color:var(--positive)">$0</div></div>
        </div>
        <div class="card">
            <h3 style="font-weight:300; margin-top:0">Equity Growth</h3>
            <canvas id="equityChart" height="100"></canvas>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, getDoc, doc, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxnZaZYUFSmN8TY-_JXsTOq5hqf3rMkaI",
        authDomain: "rk-journaling-trades.firebaseapp.com",
        projectId: "rk-journaling-trades",
        storageBucket: "rk-journaling-trades.firebasestorage.app",
        messagingSenderId: "769348692241",
        appId: "1:769348692241:web:804455307a5fedd82f84b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentUser = null;
    let trades = [];

    window.ui = {
        switchTab(id, btn) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            btn.classList.add('active');
            if(id === 'analytics') this.renderAnalytics();
        },
        async saveTrade() {
            const file = document.getElementById('t-img').files[0];
            let imgData = "";
            if(file) {
                const reader = new FileReader();
                imgData = await new Promise(r => { reader.readAsDataURL(file); reader.onload = e => r(e.target.result); });
            }

            const data = {
                user_id: currentUser,
                date: document.getElementById('t-date').value,
                symbol: document.getElementById('t-symbol').value.toUpperCase(),
                lots: parseFloat(document.getElementById('t-lots').value) || 0,
                side: document.getElementById('t-side').value,
                profit: parseFloat(document.getElementById('t-profit').value) || 0,
                session: document.getElementById('t-session').value,
                img: imgData,
                timestamp: Date.now()
            };
            await addDoc(collection(db, "trades"), data);
            this.loadData();
        },
        async undoLast() {
            if(!confirm("Delete most recent trade?")) return;
            const q = query(collection(db, "trades"), where("user_id", "==", currentUser), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            if(!snap.empty) await deleteDoc(doc(db, "trades", snap.docs[0].id));
            this.loadData();
        },
        async loadData() {
            const q = query(collection(db, "trades"), where("user_id", "==", currentUser), orderBy("date", "desc"));
            const snap = await getDocs(q);
            trades = snap.docs.map(d => d.data());
            this.renderJournal();
            this.renderCalendar();
            this.renderAnalytics();
        },
        renderJournal() {
            const body = document.getElementById('tradeBody');
            body.innerHTML = trades.map(t => `
                <tr>
                    <td>${t.date}</td><td><b>${t.symbol}</b></td>
                    <td style="color:${t.side==='BUY'?'var(--positive)':'var(--negative)'}">${t.side}</td>
                    <td>${t.session}</td>
                    <td style="color:${t.profit>=0?'var(--positive)':'var(--negative)'}">$${t.profit.toFixed(2)}</td>
                    <td>${t.img ? `<img src="${t.img}" class="img-preview">` : '—'}</td>
                </tr>
            `).join('');
        },
        renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const todayStr = now.toISOString().split('T')[0];

            // Weekly Logic (Monday start)
            const dayOfWeek = now.getDay();
            const diff = now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            const monday = new Date(now.setDate(diff)).toISOString().split('T')[0];

            let tPnl = 0, tCnt = 0, wPnl = 0, wCnt = 0, mPnl = 0, mCnt = 0;

            for(let i=1; i<=daysInMonth; i++) {
                const dStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dayTrades = trades.filter(t => t.date === dStr);
                const dayPnl = dayTrades.reduce((s,t) => s + t.profit, 0);
                
                if(dStr === todayStr) { tPnl += dayPnl; tCnt += dayTrades.length; }
                if(dStr >= monday) { wPnl += dayPnl; wCnt += dayTrades.length; }
                mPnl += dayPnl; mCnt += dayTrades.length;

                grid.innerHTML += `
                    <div class="cal-day ${dayPnl!==0?(dayPnl>0?'profit':'loss'):''}">
                        <span style="font-size:0.7rem; color:#444">${i}</span>
                        <div style="font-weight:600; color:${dayPnl>=0?'var(--positive)':'var(--negative)'}">${dayPnl!==0?'$'+dayPnl.toFixed(0):''}</div>
                        <div style="font-size:0.6rem; color:#555">${dayTrades.length > 0 ? dayTrades.length+' Trds' : ''}</div>
                    </div>`;
            }

            document.getElementById('side-today').innerText = `$${tPnl.toFixed(0)}`;
            document.getElementById('cnt-today').innerText = `${tCnt} Trades Today`;
            document.getElementById('side-week').innerText = `$${wPnl.toFixed(0)}`;
            document.getElementById('cnt-week').innerText = `${wCnt} Trades This Week`;
            document.getElementById('side-month').innerText = `$${mPnl.toFixed(0)}`;
            document.getElementById('cnt-month').innerText = `${mCnt} Trades This Month`;
        },
        renderAnalytics() {
            const wins = trades.filter(t => t.profit > 0).length;
            document.getElementById('an-total').innerText = trades.length;
            document.getElementById('an-wr').innerText = trades.length ? Math.round((wins/trades.length)*100)+'%' : '0%';
            document.getElementById('an-gp').innerText = `$${trades.reduce((s,t)=>s+(t.profit>0?t.profit:0),0).toFixed(0)}`;

            const ctx = document.getElementById('equityChart').getContext('2d');
            let curr = 0; const data = [...trades].reverse().map(t => { curr += t.profit; return curr; });
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: data.map((_,i)=>i), datasets: [{ data, borderColor: '#fff', backgroundColor: 'rgba(255,255,255,0.05)', fill: true, tension: 0.2 }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#111' } } } }
            });
        },
        exportPDF() {
            const btn = document.getElementById('pdfBtn');
            btn.innerText = "PREPARING...";
            const element = document.getElementById('main-content');
            element.classList.add('pdf-export-mode');

            const opt = {
                margin: 10,
                filename: `Trading_Journal_${currentUser}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 2, 
                    backgroundColor: '#000000', 
                    useCORS: true 
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };

            html2pdf().from(element).set(opt).save().then(() => {
                element.classList.remove('pdf-export-mode');
                btn.innerText = "Export PDF";
            }).catch(err => {
                alert("PDF Error: " + err);
                btn.innerText = "Export PDF";
            });
        }
    };

    document.getElementById('loginBtn').onclick = async () => {
        const u = document.getElementById('user-input').value.toUpperCase();
        const p = document.getElementById('pass-input').value;
        const snap = await getDoc(doc(db, "users", u));
        if(snap.exists() && snap.data().password === p) {
            currentUser = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('display-user').innerText = u;
            document.getElementById('t-date').valueAsDate = new Date();
            ui.loadData();
        } else { alert("Wrong Credentials"); }
    };
</script>
</body>
</html>
