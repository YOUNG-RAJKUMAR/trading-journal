    <script>
// ========== GLOBAL SYMBOL HELPER (must run first) ==========
window._userSuffix = localStorage.getItem('rk_symbol_suffix') || '';
window._symbolMap = {};
window._reverseMap = {};

window.buildSymbolMapWithSuffix = function() {
    const data = window.MT5Feed && MT5Feed.lastData;
    if (!data || Object.keys(data).length === 0) {
        setTimeout(window.buildSymbolMapWithSuffix, 500);
        return;
    }
    window._symbolMap = {};
    window._reverseMap = {};
    const suffix = window._userSuffix;
    Object.keys(data).forEach(actual => {
        let plain = actual;
        if (suffix && actual.endsWith(suffix)) {
            plain = actual.slice(0, -suffix.length);
        }
        plain = plain.toUpperCase();
        window._symbolMap[plain] = actual;
        window._reverseMap[actual] = plain;
    });
    console.log('[SymbolMap] Built with suffix "' + suffix + '"');
};

window.getActualSymbol = function(plainSym) {
    var stripped = (plainSym || '').replace(/\.[a-zA-Z]+$/, '').toUpperCase();
    if (window._symbolMap && window._symbolMap[stripped]) {
        return window._symbolMap[stripped];
    }
    if (window._userSuffix) {
        return stripped + window._userSuffix;
    }
    return stripped;
};

window.getPlainSymbol = function(actualSym) {
    if (window._reverseMap && window._reverseMap[actualSym]) {
        return window._reverseMap[actualSym];
    }
    if (window._userSuffix && actualSym && actualSym.endsWith(window._userSuffix)) {
        return actualSym.slice(0, -window._userSuffix.length);
    }
    return actualSym;
};

window.applySymbolSuffix = function() {
    const input = document.getElementById('symbol-suffix');
    if (input) {
        window._userSuffix = input.value.trim();
        localStorage.setItem('rk_symbol_suffix', window._userSuffix);
        if (window.MT5Feed && window.MT5Feed.lastData) window.buildSymbolMapWithSuffix();
        if (typeof deskBuildPills === 'function') deskBuildPills();
        if (typeof csRender === 'function') csRender();
        if (typeof pmRefresh === 'function') pmRefresh();
        if (window.ui && window.ui.launchTradingDesk) window.ui.launchTradingDesk();
    }
};
</script>

    <script>
function getSessionHighLowStudy(PineJS) {
    const Study = function() {
        this._sessionData = {};
        this._prevTime = null;
        this._barIndex = 0;
    };

    Study.prototype.main = function(context, inputCallback) {
        const time = context.symbol.time;
        
        // Robust bar index tracking
        if (this._prevTime === null || time > this._prevTime) {
            this._barIndex++;
            this._prevTime = time;
        }

        // Nepal timezone: UTC+5:45
        const nepalOffset = 5.75 * 3600 * 1000;
        const nepalTime = new Date(time + nepalOffset);
        const dayId = `${nepalTime.getUTCFullYear()}-${String(nepalTime.getUTCMonth() + 1).padStart(2, '0')}-${String(nepalTime.getUTCDate()).padStart(2, '0')}`;
        
        // Initialize session data for the day
        if (!this._sessionData[dayId]) {
            this._sessionData[dayId] = {
                asia: { 
                    high: NaN, low: NaN, 
                    highBar: null, lowBar: null, 
                    isActive: false
                },
                london: { 
                    high: NaN, low: NaN, 
                    highBar: null, lowBar: null, 
                    isActive: false
                },
                newyork: { 
                    high: NaN, low: NaN, 
                    highBar: null, lowBar: null, 
                    isActive: false
                }
            };
        }
        const dayData = this._sessionData[dayId];

        // Convert Nepal time to minutes since midnight
        const currentMinutes = nepalTime.getUTCHours() * 60 + nepalTime.getUTCMinutes();
        
        // Parse time strings (HH:MM format)
        const parseTime = (timeStr) => {
            const parts = (timeStr || "").split(':');
            return parts.length === 2 ? parseInt(parts[0]) * 60 + parseInt(parts[1]) : 0;
        };

        // Get parameters from input callbacks
        const extDist = inputCallback(0) || 10;
        const sessions = [
            { id: 'asia', start: parseTime(inputCallback(1)), end: parseTime(inputCallback(2)) },
            { id: 'london', start: parseTime(inputCallback(3)), end: parseTime(inputCallback(4)) },
            { id: 'newyork', start: parseTime(inputCallback(5)), end: parseTime(inputCallback(6)) }
        ];

        // Process each session
        sessions.forEach(s => {
            const data = dayData[s.id];
            
            // Determine if we're in the session
            const inSession = (s.start < s.end) 
                ? (currentMinutes >= s.start && currentMinutes < s.end) 
                : (currentMinutes >= s.start || currentMinutes < s.end);

            if (inSession) {
                // SESSION STARTED
                if (!data.isActive) {
                    data.isActive = true;
                    data.high = context.symbol.high;
                    data.low = context.symbol.low;
                    data.highBar = this._barIndex;
                    data.lowBar = this._barIndex;
                } else {
                    // DURING SESSION - Update highs and lows
                    if (context.symbol.high > data.high || isNaN(data.high)) {
                        data.high = context.symbol.high;
                        data.highBar = this._barIndex;
                    }
                    if (context.symbol.low < data.low || isNaN(data.low)) {
                        data.low = context.symbol.low;
                        data.lowBar = this._barIndex;
                    }
                }
            } else if (data.isActive) {
                // SESSION ENDED
                data.isActive = false;
            }
        });

        // Generate output values for each plot
        const getVal = (id, type) => {
            const d = dayData[id];
            
            // Only return values if session has data
            if (isNaN(d.high)) return NaN;
            
            // Return the value so it extends across the chart as a horizontal line
            return type === 'high' ? d.high : d.low;
        };

        // Return all six plot values [asiaHigh, asiaLow, lonHigh, lonLow, nyHigh, nyLow]
        return [
            getVal('asia', 'high'), getVal('asia', 'low'),
            getVal('london', 'high'), getVal('london', 'low'),
            getVal('newyork', 'high'), getVal('newyork', 'low')
        ];
    };

    return {
        name: "NepalSessionHL",
        metainfo: {
            _metainfoVersion: 51,
            id: "NepalSessionHL@tv-basicstudies-9",
            description: "Session High-Low Indicator for Nepal Timezone",
            shortDescription: "NSHL",
            isCustomIndicator: true,
            is_price_study: true,
            format: { type: 'price', precision: 2 },
            plots: [
                { id: 'asiaHigh', type: 'line' }, 
                { id: 'asiaLow', type: 'line' },
                { id: 'lonHigh', type: 'line' }, 
                { id: 'lonLow', type: 'line' },
                { id: 'nyHigh', type: 'line' }, 
                { id: 'nyLow', type: 'line' }
            ],
            styles: {
                asiaHigh: { title: 'Asia High', linestyle: 0, linewidth: 2, plottype: 0, trackPrice: false, color: '#2962FF' },
                asiaLow: { title: 'Asia Low', linestyle: 0, linewidth: 2, plottype: 0, trackPrice: false, color: '#2962FF' },
                lonHigh: { title: 'London High', linestyle: 0, linewidth: 2, plottype: 0, trackPrice: false, color: '#E91E63' },
                lonLow: { title: 'London Low', linestyle: 0, linewidth: 2, plottype: 0, trackPrice: false, color: '#E91E63' },
                nyHigh: { title: 'NY High', linestyle: 0, linewidth: 2, plottype: 0, trackPrice: false, color: '#FF9800' },
                nyLow: { title: 'NY Low', linestyle: 0, linewidth: 2, plottype: 0, trackPrice: false, color: '#FF9800' }
            },
            inputs: [
                { id: "extDist", name: "Extension Distance (Bars)", type: "integer", min: 0, max: 100, defval: 10 },
                { id: "asiaStart", name: "Asia Start (HH:MM)", type: "text", defval: "05:45" },
                { id: "asiaEnd", name: "Asia End (HH:MM)", type: "text", defval: "14:45" },
                { id: "lonStart", name: "London Start (HH:MM)", type: "text", defval: "12:45" },
                { id: "lonEnd", name: "London End (HH:MM)", type: "text", defval: "21:45" },
                { id: "nyStart", name: "NY Start (HH:MM)", type: "text", defval: "17:45" },
                { id: "nyEnd", name: "NY End (HH:MM)", type: "text", defval: "02:45" }
            ],
            defaults: {
                styles: {
                    asiaHigh: { color: '#2962FF', visible: true, linewidth: 2, linestyle: 0 },
                    asiaLow: { color: '#2962FF', visible: true, linewidth: 2, linestyle: 0 },
                    lonHigh: { color: '#E91E63', visible: true, linewidth: 2, linestyle: 0 },
                    lonLow: { color: '#E91E63', visible: true, linewidth: 2, linestyle: 0 },
                    nyHigh: { color: '#FF9800', visible: true, linewidth: 2, linestyle: 0 },
                    nyLow: { color: '#FF9800', visible: true, linewidth: 2, linestyle: 0 }
                },
                inputs: {
                    extDist: 100,
                    asiaStart: "05:45", asiaEnd: "14:45",
                    lonStart: "12:45", lonEnd: "21:45",
                    nyStart: "17:45", nyEnd: "02:45"
                },
                precision: 2
            }
        },
        constructor: Study
    };
}
